<a href='{{ site.baseurl }}{{ include.page }}' class='project-card'>
  
  <div class='date-section'>
    <div class='date'>
      <h2 id='date'>{{ include.year }}</h2>
    </div>
  </div>

  <div class='content-section'>
    <div class='title'>
      <h2 id='title'>{{ include.title }}</h2>
    </div>
    <div class='desc'>
      <p id='desc'>{{ include.desc }}</p>
    </div>
    <div class='tags-section'>
      <p>Tags: 
        {% for tag in include.tags limit:5 %}
          {{ tag }}{% unless forloop.last %}, {% endunless %}
        {% endfor %}
      </p>
    </div>
  </div>
</a>
